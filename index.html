<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Landing page cá nhân hiện đại để kết nối các kênh liên hệ nhanh chóng."
    />
    <meta
      name="keywords"
      content="landing page, profile, contact, zalo, whatsapp, social links"
    />
    <meta property="og:title" content="Landing Page Cá Nhân" />
    <meta
      property="og:description"
      content="Trang kết nối các kênh liên hệ một cách chuyên nghiệp và tối giản."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/final_avatar.jpg" />
    <meta property="og:url" content="https://example.com" />
    <link rel="icon" href="assets/final_avatar.jpg" type="image/png" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Landing Page Cá Nhân</title>
  </head>
  <body>
    <main class="page" id="top">
      <section class="profile-card" aria-labelledby="profile-name">
        <div class="profile-header">
          <img id="profile-avatar" class="avatar" src="" alt="" />
          <div class="profile-copy">
            <p class="eyebrow">Contact Hub</p>
            <h1 id="profile-name">Loading...</h1>
            <h2 id="profile-title">Loading...</h2>
            <p id="profile-bio">Loading...</p>
          </div>
        </div>

        <nav class="link-list" aria-label="Danh sách liên hệ">
          <div id="contact-links" class="links-grid"></div>
        </nav>
      </section>
    </main>

    <script src="js/script.js" defer></script>
  </body>
</html>
